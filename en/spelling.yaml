# Spelling for New World English
Vowels:
  a:
    l: "e:"
    s: "{"
    r: "A"
  e:
    l: "i:"
    s: "E"
    r: "3"
  i:
    l: "ai"
    s: "I"
    r: "3"
  o:
    l: "o"
    s: "Q"
    r: "O"
  oo:
    l: "u"
    s: "U"
    r: "u"
  u:
    l: "Iu"
    s: "E"
    r: "3"
  y:
    l: "Iu"
    s: "E"
    r: "3"
Consonants:
  b:
    "": b
  c: 
    e: s
    i: s
    y: s
    ae: s
    oe: s
    "": k
  ch:
    "": tS
  d:
    "": d
  f:
    "": f
  g:
    e: dZ
    i: dZ
    y: dZ
    ae: dZ
    oe: dZ
    "": g
Rules:
  l: [V,VCe]
  s: [VC,VCC]
  r: [Vr$,VrC,Vr]
Inflections:
  n: [s]
  v: [s,ed,ing]
Producers:
  V: [a,e,i,o,u,y]
  C: [b,c,d,f,g,h,j,k,l,m,
      n,p,q,r,s,t,v,w,x,z]
  D: [bb,cc,ck,dd,dg,ff,gg,
      kk,ll,mm,nn,pp,rr,ss,
      tch,tt,tz,vv,xc,zz]
Exceptions:
  # Force short
  have: hav
  # A's like short O
  want: wont
  watch: woch
  swamp: swomp
  wallet: wollet
  # Short EA
  bear: bair
  bread: bred
  dead: ded
  dread: dred
  health: helth
  head: hed
  headgear: hed-geer
  lead: led
  read: red
  pear: pair
  spread: spred
  stealth: stelth
  swear: swair
  thread: thred
  tread: tred
  wealth: welth
  wear: wair
  # Write an E after the consonant if you expect closed long OO
  good, hood, stood, wood， wool
  blood: blud
  flood: flud
  
  prove: proove
  proven: prooven
  # Ough
  bough: bou
  borough: bora
  brough: bruf
  chough: chuf
  clough: cluf
  Clough: clokh
  dought: dout
  drought: drout
  enough: enuf
  Greenough: Gree-nuf
  hough: hock
  lough: lokh
  plough: plou
  rough: ruf
  shough: shuf
  slough: sluf
  Slough: slou
  sough: sou
  tough: tuf
  thorough: thurra
  through: throo
  although: au-Tho
  brougham: Bro-am
  furlough: furlow
  # OW as Long O
  know: "no"
  own: oan
  show: sho
  grow: gro
  slow: slo
  window: windo
  snow: sno
  low: lo
  follow: follo
  yellow: yello
  grown: grone
  shown: shone
  tomorrow: to-MO-rro
  throw: thro
  blow: blo
  flow: flo
  growth: groath
  arrow: arro
  # GG as DGE
  # Silent H
  honest: onnest
  heir: air
  hour: our
  # One-type
  one: wun
  once: wunce
